<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teste WebSocket (My Gateway)</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; max-width: 480px; margin: 0 auto; }
    input, button { padding: 10px; margin: 4px 0; width: 100%; box-sizing: border-box; }
    button { background: #005BAA; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    #log { background: #f0f0f0; padding: 12px; margin-top: 12px; border-radius: 4px; font-size: 14px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
    .status { margin: 8px 0; padding: 8px; border-radius: 4px; }
    .status.connected { background: #d4edda; }
    .status.disconnected { background: #f8d7da; }
  </style>
</head>
<body>
  <h1>Teste WebSocket</h1>
  <p>Backend: <strong id="backendUrl">--</strong></p>
  <div id="status" class="status disconnected">Desconectado</div>
  <input type="text" id="msg" placeholder="Mensagem para enviar" />
  <button id="send">Enviar "message"</button>
  <div id="log"></div>

  <script>
    // Usa o mesmo host da página + porta do backend (funciona no PC e no celular na mesma rede)
    const PORT = 3000;
    const backendUrl = location.protocol + '//' + location.hostname + ':' + PORT;
    document.getElementById('backendUrl').textContent = backendUrl;

    const socket = io(backendUrl, {
      transports: ['websocket', 'polling'],
      withCredentials: false
    });

    const $ = (id) => document.getElementById(id);
    const log = (msg) => {
      const el = $('log');
      el.textContent = (el.textContent ? el.textContent + '\n' : '') + new Date().toLocaleTimeString() + ' ' + msg;
      el.scrollTop = el.scrollHeight;
    };

    socket.on('connect', () => {
      $('status').textContent = 'Conectado';
      $('status').className = 'status connected';
      log('Conectado ao backend');
    });
    socket.on('disconnect', (reason) => {
      $('status').textContent = 'Desconectado: ' + reason;
      $('status').className = 'status disconnected';
      log('Desconectado: ' + reason);
    });
    socket.on('connect_error', (err) => {
      log('Erro de conexão: ' + err.message);
    });
    socket.on('message', (payload) => {
      log('Recebido: ' + JSON.stringify(payload));
    });

    $('send').onclick = () => {
      const msg = $('msg').value || 'teste';
      socket.emit('message', { text: msg, from: 'ws-test' });
      log('Enviado: ' + msg);
    };
  </script>
</body>
</html>
